# Dataset registry: land cover datasets.
# See design.md sections 6.6, 6.10, and 11.3.

datasets:
  nlcd_legacy:
    description: "NLCD Land Cover, Impervious, and Tree Canopy, 30m (Collection 1.1, epoch snapshots 2001-2021)"
    strategy: local_tiff
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [2001, 2021]
    download:
      format: "COG"
      requester_pays: true
      notes: >
        Requester-pays S3 bucket (us-west-2). Requires AWS credentials:
        aws s3 cp --request-payer requester <url> .
      files:
        # --- Land Cover ---
        - year: 2021
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2021_land_cover_l48_20230630.tif"
          size_gb: 1.5
        - year: 2019
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2019_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2016
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2016_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2013
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2013_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2011
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2011_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2008
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2008_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2006
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2006_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2004
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2004_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2001
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2001_land_cover_l48_20210604.tif"
          size_gb: 1.5
        # --- Impervious Surface ---
        - year: 2021
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2021_impervious_l48_20230630.tif"
          size_gb: 1.2
        - year: 2019
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2019_impervious_l48_20210604.tif"
          size_gb: 1.2
        - year: 2016
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2016_impervious_l48_20210604.tif"
          size_gb: 1.2
        - year: 2011
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2011_impervious_l48_20210604.tif"
          size_gb: 1.2
        # --- Tree Canopy ---
        - year: 2021
          variable: tree_canopy
          url: "s3://usgs-landcover/collection-1-1/nlcd_2021_treecanopy_l48_20230630.tif"
          size_gb: 1.0
        - year: 2016
          variable: tree_canopy
          url: "s3://usgs-landcover/collection-1-1/nlcd_2016_treecanopy_l48_20210604.tif"
          size_gb: 1.0
        - year: 2011
          variable: tree_canopy
          url: "s3://usgs-landcover/collection-1-1/nlcd_2011_treecanopy_l48_20210604.tif"
          size_gb: 1.0
    variables:
      - name: land_cover
        band: 1
        long_name: "NLCD land cover class"
        native_name: "land_cover"
        categorical: true
      - name: impervious
        band: 1
        units: "%"
        long_name: "Percent developed imperviousness"
        native_name: "impervious"
        categorical: false
      - name: tree_canopy
        band: 1
        units: "%"
        long_name: "Percent tree canopy cover"
        native_name: "tree_canopy"
        categorical: false

  nlcd_annual:
    description: "Annual NLCD, 30m (Collection 1.1, 1985-2024)"
    strategy: local_tiff
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    download:
      url_template: "s3://usgs-landcover/annual-nlcd/c1/v0/cu/mosaic/Annual_NLCD_{variable}_{year}_CU_C1V0.tif"
      year_range: [1985, 2024]
      variables_available: [LndCov, LndChg, LndCnf, FctImp, ImpDsc, SpcChg]
      requester_pays: true
      format: "COG"
      notes: "Requester-pays S3 bucket (us-west-2). Requires AWS credentials."
    variables:
      - name: LndCov
        band: 1
        long_name: "Land cover class"
        native_name: "LndCov"
        categorical: true
      - name: LndChg
        band: 1
        long_name: "Land cover change"
        native_name: "LndChg"
        categorical: true
      - name: LndCnf
        band: 1
        units: "%"
        long_name: "Land cover confidence"
        native_name: "LndCnf"
        categorical: false
      - name: FctImp
        band: 1
        units: "%"
        long_name: "Fractional impervious surface"
        native_name: "FctImp"
        categorical: false
      - name: ImpDsc
        band: 1
        long_name: "Impervious descriptor"
        native_name: "ImpDsc"
        categorical: true
      - name: SpcChg
        band: 1
        units: "day_of_year"
        long_name: "Spectral change day of year"
        native_name: "SpcChg"
        categorical: false

  # --- NLCD Annual via NHGF STAC OSN (free, anonymous access) ---
  # One entry per STAC collection. Uses NHGFStacTiffData + ZonalGen directly.

  nlcd_osn_lndcov:
    description: "Annual NLCD Land Cover via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-LndCov
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: LndCov
        band: 1
        long_name: "Land cover class"
        native_name: "LndCov"
        categorical: true

  nlcd_osn_fctimp:
    description: "Annual NLCD Fractional Impervious via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-FctImp
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: FctImp
        band: 1
        units: "%"
        long_name: "Fractional impervious surface"
        native_name: "FctImp"
        categorical: false

  nlcd_osn_impdsc:
    description: "Annual NLCD Impervious Descriptor via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-ImpDsc
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: ImpDsc
        band: 1
        long_name: "Impervious descriptor"
        native_name: "ImpDsc"
        categorical: true

  nlcd_osn_lndchg:
    description: "Annual NLCD Land Cover Change via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-LndChg
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: LndChg
        band: 1
        long_name: "Land cover change"
        native_name: "LndChg"
        categorical: true

  nlcd_osn_lndcnf:
    description: "Annual NLCD Land Cover Confidence via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-LndCnf
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: LndCnf
        band: 1
        units: "%"
        long_name: "Land cover confidence"
        native_name: "LndCnf"
        categorical: false

  nlcd_osn_spcchg:
    description: "Annual NLCD Spectral Change via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-SpcChg
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: SpcChg
        band: 1
        units: "day_of_year"
        long_name: "Spectral change day of year"
        native_name: "SpcChg"
        categorical: false
