# Dataset registry: soils datasets.
# See design.md sections 6.6, 6.10, and 11.3.
#
# === SSURGO / STATSGO2 / gNATSGO / POLARIS relationship ===
#
# SSURGO (Soil Survey Geographic Database) is the detailed polygon soil survey
# from NRCS. STATSGO2 (State Soil Geographic Database) is the generalized version,
# used to gap-fill where SSURGO has no data.
#
# gNATSGO = rasterized SSURGO + STATSGO2 gap-fill, 30m resolution.
#   - Pre-summarized rasters on Planetary Computer (aws0_100, rootznemc, rootznaws, mukey).
#   - For full property access, join mukey raster to SSURGO tabular data.
#
# POLARIS = probabilistic remapping of SSURGO/STATSGO2 soil survey data onto a 30m
#   grid using machine learning (Chaney et al., 2019). Provides continuous surfaces
#   with uncertainty (p5, mean, mode, p50, p95) for 13 soil properties at 6 depths.
#   Served as VRT mosaics from Duke University — can be opened directly via
#   GDAL vsicurl over HTTP (no download needed for processing).
#
# gNATSGO and POLARIS both provide rasterized access to the underlying
# SSURGO/STATSGO2 survey data.
# For direct SSURGO polygon access: NRCS Soil Data Access (SDA) web service
# or the soilDB R package.

datasets:
  polaris_30m:
    description: "POLARIS soil properties, 30m (1 arcsecond), CONUS"
    strategy: local_tiff
    crs: "EPSG:4326"
    x_coord: "x"
    y_coord: "y"
    category: soils
    temporal: false
    download:
      format: "GeoTIFF (VRT mosaic over 1-degree tiles)"
      notes: >
        POLARIS data is served as VRT mosaics from Duke University.
        Each VRT file can be opened directly via GDAL/rasterio over HTTP
        (vsicurl) or downloaded for local use.
        Base URL: http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/
        Pattern: {variable}_{statistic}_{depth}.vrt
        Statistics: mean, mode, p5, p50, p95
        Depths: 0_5, 5_15, 15_30, 30_60, 60_100, 100_200 (cm)
        License: CC BY-NC 4.0.
        Also accessible via pygeohydro.soil_polaris() (HyRiver).
      files:
        # Key VRT files for NHM-PRMS parameterization (mean statistic).
        # Sand/silt/clay -> soil_type reclassification
        - year: 0
          variable: sand_mean_0_5
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/sand_mean_0_5.vrt"
        - year: 0
          variable: silt_mean_0_5
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/silt_mean_0_5.vrt"
        - year: 0
          variable: clay_mean_0_5
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/clay_mean_0_5.vrt"
        # Porosity (theta_s) -> sat_threshold derivation
        - year: 0
          variable: theta_s_mean_0_5
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/theta_s_mean_0_5.vrt"
        - year: 0
          variable: theta_s_mean_5_15
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/theta_s_mean_5_15.vrt"
        - year: 0
          variable: theta_s_mean_15_30
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/theta_s_mean_15_30.vrt"
        - year: 0
          variable: theta_s_mean_30_60
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/theta_s_mean_30_60.vrt"
        - year: 0
          variable: theta_s_mean_60_100
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/theta_s_mean_60_100.vrt"
        - year: 0
          variable: theta_s_mean_100_200
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/theta_s_mean_100_200.vrt"
        # Ksat -> calibration seeds (ssr2gw_rate, slowcoef_lin, fastcoef_lin)
        - year: 0
          variable: ksat_mean_0_5
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/ksat_mean_0_5.vrt"
        # Bulk density
        - year: 0
          variable: bd_mean_0_5
          url: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/bd_mean_0_5.vrt"
    # All 13 POLARIS soil properties listed below. download.files contains
    # only the subset needed for NHM-PRMS; see download.notes for URL pattern.
    #
    # Variables with source_override: URLs can be processed directly over HTTP (no download).
    # Variables without source_override: require downloading first (see download section).
    variables:
      - name: sand
        band: 1
        units: "%"
        long_name: "Sand content"
        categorical: false
        source_override: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/sand_mean_0_5.vrt"
      - name: silt
        band: 1
        units: "%"
        long_name: "Silt content"
        categorical: false
        source_override: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/silt_mean_0_5.vrt"
      - name: clay
        band: 1
        units: "%"
        long_name: "Clay content"
        categorical: false
        source_override: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/clay_mean_0_5.vrt"
      - name: bd
        band: 1
        units: "g/cm3"
        long_name: "Bulk density"
        categorical: false
        source_override: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/bd_mean_0_5.vrt"
      - name: theta_s
        band: 1
        units: "m3/m3"
        long_name: "Saturated water content (porosity)"
        categorical: false
        source_override: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/theta_s_mean_0_5.vrt"
      - name: theta_r
        band: 1
        units: "m3/m3"
        long_name: "Residual water content"
        categorical: false
      - name: ksat
        band: 1
        units: "log10(cm/hr)"
        long_name: "Saturated hydraulic conductivity"
        categorical: false
        source_override: "http://hydrology.cee.duke.edu/POLARIS/PROPERTIES/v1.0/vrt/ksat_mean_0_5.vrt"
      - name: ph
        band: 1
        units: ""
        long_name: "Soil pH in H2O"
        categorical: false
      - name: om
        band: 1
        units: "log10(%)"
        long_name: "Organic matter"
        categorical: false
      - name: lambda
        band: 1
        units: ""
        long_name: "Brooks-Corey pore size distribution index"
        categorical: false
      - name: hb
        band: 1
        units: "log10(kPa)"
        long_name: "Brooks-Corey bubbling pressure"
        categorical: false
      - name: n
        band: 1
        units: ""
        long_name: "Van Genuchten pore size distribution"
        categorical: false
      - name: alpha
        band: 1
        units: "log10(kPa^-1)"
        long_name: "Van Genuchten scale parameter"
        categorical: false

  gnatsgo_rasters:
    description: "gNATSGO pre-summarized soil properties, 30m (Planetary Computer)"
    strategy: stac_cog
    catalog_url: "https://planetarycomputer.microsoft.com/api/stac/v1"
    collection: "gnatsgo-rasters"
    gsd: 30
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    sign: planetary_computer
    category: soils
    temporal: false
    variables:
      - name: aws0_100
        band: 1
        units: "cm"
        long_name: "Available water storage 0-100cm"
        categorical: false
        asset_key: "aws0_100"
      - name: rootznemc
        band: 1
        units: "cm"
        long_name: "Root zone depth"
        categorical: false
        asset_key: "rootznemc"
      - name: rootznaws
        band: 1
        units: "cm"
        long_name: "Root zone available water storage"
        categorical: false
        asset_key: "rootznaws"
      - name: mukey
        band: 1
        units: ""
        long_name: "Map unit key (for tabular join to full soil properties)"
        categorical: true
        asset_key: "mukey"
