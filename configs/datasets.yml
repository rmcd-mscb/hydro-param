# Dataset registry: maps dataset names to access strategies.
#
# Each entry describes how to find, load, and interpret a dataset.
# Pipeline configs reference datasets by name; the registry resolves them.
# See design.md sections 6.6 and 11.3 for the schema design.
#
# Coordinate fields (x_coord, y_coord, t_coord) map to the gdptools
# UserTiffData/UserCatData constructor parameters source_x_coord,
# source_y_coord, and source_t_coord respectively.

datasets:
  # --- Topography (continuous, with derived variables) ---
  dem_3dep_10m:
    description: "USGS 3DEP Seamless DEM, 1/3 arc-second (~10m)"
    strategy: stac_cog
    catalog_url: "https://planetarycomputer.microsoft.com/api/stac/v1"
    collection: "3dep-seamless"
    asset_key: "data"
    gsd: 10
    crs: "EPSG:4326"
    x_coord: "x"
    y_coord: "y"
    sign: planetary_computer
    category: topography
    temporal: false
    variables:
      - name: elevation
        band: 1
        units: "m"
        long_name: "Surface elevation above NAVD88"
        categorical: false
    derived_variables:
      - name: slope
        source: elevation
        method: horn
        units: "degrees"
        long_name: "Terrain slope"
      - name: aspect
        source: elevation
        method: horn
        units: "degrees"
        long_name: "Terrain aspect (clockwise from north)"

  # --- Soils (continuous, multiple variables) ---
  # Not yet implemented in code; registry entry validates schema generality.
  polaris_100m:
    description: "POLARIS soil properties, 100m resolution"
    strategy: converted_zarr
    source: "s3://hytest/polaris/polaris_100m_mean.zarr"
    crs: "EPSG:4326"
    x_coord: "lon"
    y_coord: "lat"
    category: soils
    temporal: false
    variables:
      - name: sand_pct
        units: "%"
        long_name: "Sand content"
        categorical: false
      - name: clay_pct
        units: "%"
        long_name: "Clay content"
        categorical: false
      - name: ksat
        units: "cm/hr"
        long_name: "Saturated hydraulic conductivity"
        categorical: false
      - name: theta_s
        units: "m3/m3"
        long_name: "Saturated water content"
        categorical: false

  # --- Vegetation / Land Cover (categorical + continuous) ---
  nlcd:
    description: "NLCD Land Cover, Impervious, and Tree Canopy, 30m (Collection 1.1)"
    strategy: local_tiff
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    download:
      format: "COG"
      notes: >
        Download via AWS CLI (no credentials required):
        aws s3 cp --no-sign-request <url> .
      files:
        # --- Land Cover ---
        - year: 2021
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2021_land_cover_l48_20230630.tif"
          size_gb: 1.5
        - year: 2019
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2019_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2016
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2016_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2013
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2013_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2011
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2011_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2008
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2008_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2006
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2006_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2004
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2004_land_cover_l48_20210604.tif"
          size_gb: 1.5
        - year: 2001
          variable: land_cover
          url: "s3://usgs-landcover/collection-1-1/nlcd_2001_land_cover_l48_20210604.tif"
          size_gb: 1.5
        # --- Impervious Surface ---
        - year: 2021
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2021_impervious_l48_20230630.tif"
          size_gb: 1.2
        - year: 2019
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2019_impervious_l48_20210604.tif"
          size_gb: 1.2
        - year: 2016
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2016_impervious_l48_20210604.tif"
          size_gb: 1.2
        - year: 2011
          variable: impervious
          url: "s3://usgs-landcover/collection-1-1/nlcd_2011_impervious_l48_20210604.tif"
          size_gb: 1.2
        # --- Tree Canopy ---
        - year: 2021
          variable: tree_canopy
          url: "s3://usgs-landcover/collection-1-1/nlcd_2021_treecanopy_l48_20230630.tif"
          size_gb: 1.0
        - year: 2016
          variable: tree_canopy
          url: "s3://usgs-landcover/collection-1-1/nlcd_2016_treecanopy_l48_20210604.tif"
          size_gb: 1.0
        - year: 2011
          variable: tree_canopy
          url: "s3://usgs-landcover/collection-1-1/nlcd_2011_treecanopy_l48_20210604.tif"
          size_gb: 1.0
    variables:
      - name: land_cover
        band: 1
        long_name: "NLCD land cover class"
        categorical: true
      - name: impervious
        band: 1
        long_name: "Percent developed imperviousness"
        categorical: false
      - name: tree_canopy
        band: 1
        long_name: "Percent tree canopy cover"
        categorical: false
