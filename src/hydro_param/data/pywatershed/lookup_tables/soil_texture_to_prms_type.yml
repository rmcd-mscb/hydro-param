# USDA soil texture triangle class to PRMS soil_type.
# Source: Regan et al. 2018 (TM6-B9).

name: soil_texture_to_prms_type
description: "USDA texture triangle class to PRMS soil_type (1=sand, 2=loam, 3=clay)"
source: "Regan et al. 2018 (USGS TM6-B9)"

# PRMS soil_type values:
#   1 = sand (coarse-textured)
#   2 = loam (medium-textured)
#   3 = clay (fine-textured)

mapping:
  sand: 1
  loamy_sand: 1
  sandy_loam: 2
  loam: 2
  silt_loam: 2
  silt: 2
  sandy_clay_loam: 2
  clay_loam: 2
  silty_clay_loam: 3
  sandy_clay: 3
  silty_clay: 3
  clay: 3
