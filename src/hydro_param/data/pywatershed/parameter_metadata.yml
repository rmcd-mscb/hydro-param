# =============================================================================
# pywatershed Parameter Metadata for Validation
# =============================================================================
# Extracted from docs/reference/pywatershed_dataset_param_map.yml.
# Used by PywatershedFormatter.validate() and derivation plugin.
#
# Each parameter entry defines:
#   dimension   — nhru, nsegment, [nhru,12], [nhru,366], nmonth, one
#   units       — target units in PRMS convention
#   valid_range — [min, max] for value validation
#   required    — whether the parameter must be present for a valid model
#   description — human-readable description
# =============================================================================

parameters:

  # --- Topography-derived (Step 3) ---
  hru_elev:
    dimension: nhru
    units: feet
    valid_range: [-1000.0, 30000.0]
    required: true
    description: "Mean HRU elevation"

  hru_slope:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 10.0]
    required: true
    description: "Mean HRU land surface slope (rise/run)"

  hru_aspect:
    dimension: nhru
    units: degrees
    valid_range: [0.0, 360.0]
    required: true
    description: "Mean HRU aspect (0=north, clockwise)"

  # --- Geometry (Step 1) ---
  hru_lat:
    dimension: nhru
    units: decimal_degrees
    valid_range: [-90.0, 90.0]
    required: true
    description: "Latitude of HRU centroid"

  hru_lon:
    dimension: nhru
    units: decimal_degrees
    valid_range: [-180.0, 180.0]
    required: true
    description: "Longitude of HRU centroid"

  hru_area:
    dimension: nhru
    units: acres
    valid_range: [0.0, 100000000.0]
    required: true
    description: "Area of HRU"

  # --- Land cover (Steps 4 & 8) ---
  cov_type:
    dimension: nhru
    units: integer
    valid_range: [0, 4]
    required: true
    description: "Vegetation cover type (0=bare, 1=grasses, 2=shrubs, 3=trees, 4=coniferous)"

  covden_sum:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: true
    description: "Summer vegetation cover density"

  covden_win:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: true
    description: "Winter vegetation cover density"

  hru_percent_imperv:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: true
    description: "HRU fraction that is impervious"

  srain_intcp:
    dimension: nhru
    units: inches
    valid_range: [0.0, 1.0]
    required: true
    description: "Summer rain interception storage capacity"

  wrain_intcp:
    dimension: nhru
    units: inches
    valid_range: [0.0, 1.0]
    required: true
    description: "Winter rain interception storage capacity"

  snow_intcp:
    dimension: nhru
    units: inches
    valid_range: [0.0, 1.0]
    required: true
    description: "Snow interception storage capacity"

  imperv_stor_max:
    dimension: nhru
    units: inches
    valid_range: [0.0, 0.5]
    required: true
    description: "Maximum impervious surface retention storage"

  # --- Topology (Step 2, future) ---
  tosegment:
    dimension: nsegment
    units: integer
    valid_range: [0, 1000000]
    required: false
    description: "Downstream segment ID (0 = outlet)"

  hru_segment:
    dimension: nhru
    units: integer
    valid_range: [0, 1000000]
    required: false
    description: "Segment ID that each HRU drains to"

  seg_length:
    dimension: nsegment
    units: meters
    valid_range: [0.0, 1000000.0]
    required: false
    description: "Length of stream segment"

  seg_lat:
    dimension: nsegment
    units: decimal_degrees
    valid_range: [-90.0, 90.0]
    required: false
    description: "Latitude of segment centroid"

  nhm_id:
    dimension: nhru
    units: none
    type: integer
    required: false
    description: "HRU identifier from fabric id_field"

  nhm_seg:
    dimension: nsegment
    units: none
    type: integer
    required: false
    description: "Segment identifier from fabric segment_id_field"

  hru_segment_nhm:
    dimension: nhru
    units: none
    type: integer
    required: false
    description: "Segment identifier for HRU contributing flow"

  # --- Soils (Step 5, future) ---
  soil_type:
    dimension: nhru
    units: integer
    valid_range: [1, 3]
    required: false
    description: "Soil type (1=sand, 2=loam, 3=clay)"

  soil_moist_max:
    dimension: nhru
    units: inches
    valid_range: [0.001, 100.0]
    required: false
    description: "Maximum available water-holding capacity"

  soil_rechr_max_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Max recharge zone storage as fraction of soil_moist_max"

  sat_threshold:
    dimension: nhru
    units: inches
    valid_range: [0.0, 999.9]
    required: false
    description: "Gravity + preferential reservoir storage capacity"

  # --- HRU type ---
  hru_type:
    dimension: nhru
    units: integer
    valid_range: [0, 3]
    required: false
    description: "HRU type (0=inactive, 1=land, 2=lake, 3=swale)"

  # --- Depression storage (Step 6, future) ---
  dprst_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of HRU with surface depressions"

  dprst_area_max:
    dimension: nhru
    units: acres
    valid_range: [0.0, 100000000.0]
    required: false
    description: "Maximum surface depression area"

  # --- Routing (Step 12, future) ---
  K_coef:
    dimension: nsegment
    units: hours
    valid_range: [0.0, 240.0]
    required: false
    description: "Muskingum storage time coefficient"

  x_coef:
    dimension: nsegment
    units: dimensionless
    valid_range: [0.0, 0.5]
    required: false
    description: "Muskingum routing weighting factor"

  # --- Solar radiation (Step 9, future) ---
  soltab_potsw:
    dimension: [nhru, 366]
    units: langleys_per_day
    valid_range: [0.0, 2000.0]
    required: false
    description: "Potential shortwave radiation table"

  soltab_horad_potsw:
    dimension: [nhru, 366]
    units: langleys_per_day
    valid_range: [0.0, 2000.0]
    required: false
    description: "Horizontal potential shortwave radiation"

  # --- PET (Step 10, future) ---
  jh_coef:
    dimension: nmonth
    units: per_degF_per_day
    valid_range: [0.0, 100.0]
    required: false
    description: "Jensen-Haise PET coefficient (monthly)"

  jh_coef_hru:
    dimension: nhru
    units: per_degF_per_day
    valid_range: [0.0, 100.0]
    required: false
    description: "Per-HRU Jensen-Haise air temperature coefficient"

  # --- Climate-derived (Step 11, future) ---
  transp_beg:
    dimension: nhru
    units: integer_month
    valid_range: [1, 12]
    required: false
    description: "Month transpiration begins"

  transp_end:
    dimension: nhru
    units: integer_month
    valid_range: [1, 12]
    required: false
    description: "Month transpiration ends"

  # --- Snow defaults (Step 13) ---
  den_init:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.01, 0.80]
    required: false
    description: "Initial snow density"

  den_max:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.10, 0.90]
    required: false
    description: "Maximum snow density"

  settle_const:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Snow settlement constant"

  emis_noppt:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.5, 1.0]
    required: false
    description: "Emissivity of air on no-precip days"

  freeh2o_cap:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 0.20]
    required: false
    description: "Free-water holding capacity of snowpack"

  potet_sublim:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of PET that can be sublimation"

  tmax_allsnow:
    dimension: [nhru, 12]
    units: degF
    valid_range: [20.0, 45.0]
    required: false
    description: "Maximum temperature for all-snow precipitation"

  # --- Albedo defaults ---
  albset_rna:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: rain on new snow, accumulation period"

  albset_snm:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: snowmelt in melt period"

  albset_rnm:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: rain in melt period"

  albset_sna:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: new snow in accumulation period"

  # --- Radiation defaults ---
  radmax:
    dimension: [nhru, 12]
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Maximum fraction of potential solar radiation"

  radj_sppt:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Summer precipitation radiation adjustment"

  radj_wppt:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Winter precipitation radiation adjustment"

  # --- Initial conditions ---
  soil_moist_init_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Initial soil moisture as fraction of max"

  soil_rechr_init_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Initial recharge zone moisture as fraction of max"

  ssstor_init_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Initial subsurface storage as fraction"

  gwstor_init:
    dimension: nhru
    units: inches
    valid_range: [0.0, 100.0]
    required: false
    description: "Initial groundwater storage"

  gwstor_min:
    dimension: nhru
    units: inches
    valid_range: [0.0, 100.0]
    required: false
    description: "Minimum groundwater storage"

  dprst_depth_avg:
    dimension: nhru
    units: inches
    valid_range: [0.0, 1000.0]
    required: false
    description: "Average surface depression depth"

  transp_tmax:
    dimension: nhru
    units: degree_days
    valid_range: [0.0, 10000.0]
    required: false
    description: "Accumulated degree-days threshold for transpiration"

  # --- Depression storage (operational defaults) ---
  dprst_et_coef:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of unsatisfied PET applied to depression storage"

  dprst_flow_coef:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Coefficient for open depression linear flow routing"

  dprst_frac_init:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Initial depression storage as fraction of maximum"

  dprst_frac_open:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of open depression area generating runoff"

  dprst_seep_rate_clos:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Seepage rate coefficient for closed depressions"

  dprst_seep_rate_open:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Seepage rate coefficient for open depressions"

  sro_to_dprst_imperv:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of impervious runoff to depression storage"

  sro_to_dprst_perv:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of pervious runoff to depression storage"

  op_flow_thres:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Open depression outflow threshold fraction"

  va_clos_exp:
    dimension: nhru
    units: dimensionless
    valid_range: [0.0001, 10.0]
    required: false
    description: "Closed depression storage-area exponent"

  va_open_exp:
    dimension: nhru
    units: dimensionless
    valid_range: [0.0001, 10.0]
    required: false
    description: "Open depression storage-area exponent"

  # --- Snow (additional defaults) ---
  cecn_coef:
    dimension: [nhru, 12]
    units: calories_per_degC
    valid_range: [0.0, 20.0]
    required: false
    description: "Monthly convection condensation energy coefficient"

  rad_trncf:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Solar radiation transmission coefficient through canopy"

  melt_force:
    dimension: nhru
    units: julian_day
    valid_range: [1, 366]
    required: false
    description: "Julian date to force spring snowmelt stage"

  melt_look:
    dimension: nhru
    units: julian_day
    valid_range: [1, 366]
    required: false
    description: "Julian date to start looking for spring snowmelt"

  snowinfil_max:
    dimension: nhru
    units: inches
    valid_range: [0.0, 20.0]
    required: false
    description: "Maximum snow infiltration per day"

  snowpack_init:
    dimension: nhru
    units: inches
    valid_range: [0.0, 5000.0]
    required: false
    description: "Initial snowpack water equivalent"

  hru_deplcrv:
    dimension: nhru
    units: integer
    valid_range: [1, 10]
    required: false
    description: "Index of snow depletion curve"

  tstorm_mo:
    dimension: [nhru, 12]
    units: integer
    valid_range: [0, 1]
    required: false
    description: "Monthly thunderstorm prevalence flag"

  snarea_curve:
    dimension: ndeplval
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Snow area depletion curve values"

  # --- Atmosphere (additional defaults) ---
  ppt_rad_adj:
    dimension: [nhru, 12]
    units: inches
    valid_range: [0.0, 0.5]
    required: false
    description: "Precipitation threshold for radiation adjustment"

  radadj_intcp:
    dimension: [nhru, 12]
    units: dimensionless
    valid_range: [0.0, 1.0]
    required: false
    description: "Temperature range adjustment intercept for radiation"

  radadj_slope:
    dimension: [nhru, 12]
    units: dimensionless
    valid_range: [0.0, 1.0]
    required: false
    description: "Temperature range adjustment slope for radiation"

  tmax_index:
    dimension: [nhru, 12]
    units: degF
    valid_range: [0.0, 120.0]
    required: false
    description: "Monthly maximum temperature index"

  temp_units:
    dimension: one
    units: integer
    valid_range: [0, 1]
    required: false
    description: "Temperature units (0=Fahrenheit, 1=Celsius)"

  # --- Soilzone (additional defaults) ---
  pref_flow_infil_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [-1.0, 1.0]
    required: false
    description: "Fraction of infiltration to preferential flow reservoir"

  # --- Channel (additional defaults) ---
  mann_n:
    dimension: nsegment
    units: dimensionless
    valid_range: [0.001, 1.0]
    required: false
    description: "Manning's roughness coefficient"

  seg_depth:
    dimension: nsegment
    units: feet
    valid_range: [0.0, 1000.0]
    required: false
    description: "Bankfull water depth in segment"

  segment_flow_init:
    dimension: nsegment
    units: cfs
    valid_range: [0.0, 100000.0]
    required: false
    description: "Initial flow in stream segment"

  obsout_segment:
    dimension: nsegment
    units: integer
    valid_range: [0, 100000]
    required: false
    description: "Index of measured streamflow station replacing segment outflow"

  tosegment_nhm:
    dimension: nsegment
    units: integer
    valid_range: [0, 1000000]
    required: false
    description: "NHM downstream segment ID"

  # --- Structural ---
  hru_in_to_cf:
    dimension: nhru
    units: cubic_feet_per_inch_acre
    valid_range: [0.0, 1000000000.0]
    required: false
    description: "Inches-to-cubic-feet conversion factor per HRU"

  seg_elev:
    dimension: nsegment
    units: feet
    valid_range: [-1000.0, 30000.0]
    required: false
    description: "Mean segment channel elevation"

  seg_slope:
    dimension: nsegment
    units: decimal_fraction
    valid_range: [0.0, 10.0]
    required: false
    description: "Stream segment slope"

  seg_cum_area:
    dimension: nsegment
    units: acres
    valid_range: [0.0, 1000000000.0]
    required: false
    description: "Cumulative drainage area of segment"

  segment_type:
    dimension: nsegment
    units: integer
    valid_range: [0, 3]
    required: false
    description: "Segment type (0=segment, 1=headwater, 2=lake, 3=replacement)"

  obsin_segment:
    dimension: nsegment
    units: integer
    valid_range: [0, 100000]
    required: false
    description: "Index of observed inflow station for segment"

  # --- Calibration parameters (Step 14, future — seeds only) ---
  carea_max:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Maximum contributing area"

  smidx_coef:
    dimension: nhru
    units: dimensionless
    valid_range: [0.001, 0.06]
    required: false
    description: "Soil moisture index coefficient"

  smidx_exp:
    dimension: nhru
    units: dimensionless
    valid_range: [0.1, 0.8]
    required: false
    description: "Soil moisture index exponent"

  soil2gw_max:
    dimension: nhru
    units: inches
    valid_range: [0.0, 5.0]
    required: false
    description: "Max soil-to-groundwater flow rate"

  ssr2gw_rate:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Subsurface-to-groundwater linear coefficient"

  ssr2gw_exp:
    dimension: nhru
    units: dimensionless
    valid_range: [0.0, 3.0]
    required: false
    description: "Subsurface-to-groundwater exponent"

  slowcoef_lin:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.001, 0.5]
    required: false
    description: "Slow interflow linear coefficient"

  slowcoef_sq:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Slow interflow nonlinear coefficient"

  fastcoef_lin:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.001, 1.0]
    required: false
    description: "Fast interflow linear coefficient"

  fastcoef_sq:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fast interflow nonlinear coefficient"

  pref_flow_den:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 0.1]
    required: false
    description: "Preferential flow pore density"

  gwflow_coef:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.001, 0.5]
    required: false
    description: "Groundwater discharge coefficient"

  gwsink_coef:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Groundwater sink coefficient (deep losses)"

  snarea_thresh:
    dimension: nhru
    units: inches
    valid_range: [0.1, 200.0]
    required: false
    description: "Snow depletion threshold"

  # --- Climate adjustments (monthly, Step 14 future) ---
  rain_cbh_adj:
    dimension: [nhru, 12]
    units: decimal_fraction
    valid_range: [0.5, 2.0]
    required: false
    description: "Monthly rain adjustment factor"

  snow_cbh_adj:
    dimension: [nhru, 12]
    units: decimal_fraction
    valid_range: [0.5, 2.0]
    required: false
    description: "Monthly snow adjustment factor"

  tmax_cbh_adj:
    dimension: [nhru, 12]
    units: degF
    valid_range: [-10.0, 10.0]
    required: false
    description: "Monthly tmax adjustment"

  tmin_cbh_adj:
    dimension: [nhru, 12]
    units: degF
    valid_range: [-10.0, 10.0]
    required: false
    description: "Monthly tmin adjustment"

  tmax_allrain_offset:
    dimension: [nhru, 12]
    units: degF
    valid_range: [0.0, 20.0]
    required: false
    description: "Offset from tmax_allsnow for all-rain threshold"

  adjmix_rain:
    dimension: [nhru, 12]
    units: decimal_fraction
    valid_range: [0.5, 1.5]
    required: false
    description: "Rain/snow mix adjustment factor"

  dday_slope:
    dimension: [nhru, 12]
    units: dimensionless
    valid_range: [0.2, 0.8]
    required: false
    description: "Degree-day radiation slope (monthly)"

  dday_intcp:
    dimension: [nhru, 12]
    units: dimensionless
    valid_range: [-60.0, 10.0]
    required: false
    description: "Degree-day radiation intercept (monthly)"
