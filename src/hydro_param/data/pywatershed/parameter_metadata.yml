# =============================================================================
# pywatershed Parameter Metadata for Validation
# =============================================================================
# Extracted from docs/reference/pywatershed_dataset_param_map.yml.
# Used by PywatershedFormatter.validate() and derivation plugin.
#
# Each parameter entry defines:
#   dimension   — nhru, nsegment, [nhru,12], [nhru,366], nmonths, one
#   units       — target units in PRMS convention
#   valid_range — [min, max] for value validation
#   required    — whether the parameter must be present for a valid model
#   description — human-readable description
# =============================================================================

parameters:

  # --- Topography-derived (Step 3) ---
  hru_elev:
    dimension: nhru
    units: feet
    valid_range: [-1000.0, 30000.0]
    required: true
    description: "Mean HRU elevation"

  hru_slope:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 10.0]
    required: true
    description: "Mean HRU land surface slope (rise/run)"

  hru_aspect:
    dimension: nhru
    units: degrees
    valid_range: [0.0, 360.0]
    required: true
    description: "Mean HRU aspect (0=north, clockwise)"

  # --- Geometry (Step 1) ---
  hru_lat:
    dimension: nhru
    units: decimal_degrees
    valid_range: [-90.0, 90.0]
    required: true
    description: "Latitude of HRU centroid"

  hru_area:
    dimension: nhru
    units: acres
    valid_range: [0.0, 100000000.0]
    required: true
    description: "Area of HRU"

  # --- Land cover (Steps 4 & 8) ---
  cov_type:
    dimension: nhru
    units: integer
    valid_range: [0, 4]
    required: true
    description: "Vegetation cover type (0=bare, 1=grasses, 2=shrubs, 3=trees, 4=coniferous)"

  covden_sum:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: true
    description: "Summer vegetation cover density"

  covden_win:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: true
    description: "Winter vegetation cover density"

  hru_percent_imperv:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: true
    description: "HRU fraction that is impervious"

  srain_intcp:
    dimension: nhru
    units: inches
    valid_range: [0.0, 1.0]
    required: true
    description: "Summer rain interception storage capacity"

  wrain_intcp:
    dimension: nhru
    units: inches
    valid_range: [0.0, 1.0]
    required: true
    description: "Winter rain interception storage capacity"

  snow_intcp:
    dimension: nhru
    units: inches
    valid_range: [0.0, 1.0]
    required: true
    description: "Snow interception storage capacity"

  imperv_stor_max:
    dimension: nhru
    units: inches
    valid_range: [0.0, 0.5]
    required: true
    description: "Maximum impervious surface retention storage"

  # --- Topology (Step 2, future) ---
  tosegment:
    dimension: nsegment
    units: integer
    valid_range: [0, 1000000]
    required: false
    description: "Downstream segment ID (0 = outlet)"

  hru_segment:
    dimension: nhru
    units: integer
    valid_range: [0, 1000000]
    required: false
    description: "Segment ID that each HRU drains to"

  seg_length:
    dimension: nsegment
    units: meters
    valid_range: [0.0, 1000000.0]
    required: false
    description: "Length of stream segment"

  # --- Soils (Step 5, future) ---
  soil_type:
    dimension: nhru
    units: integer
    valid_range: [1, 3]
    required: false
    description: "Soil type (1=sand, 2=loam, 3=clay)"

  soil_moist_max:
    dimension: nhru
    units: inches
    valid_range: [0.001, 100.0]
    required: false
    description: "Maximum available water-holding capacity"

  soil_rechr_max_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Max recharge zone storage as fraction of soil_moist_max"

  sat_threshold:
    dimension: nhru
    units: inches
    valid_range: [0.0, 999.0]
    required: false
    description: "Gravity + preferential reservoir storage capacity"

  # --- HRU type ---
  hru_type:
    dimension: nhru
    units: integer
    valid_range: [0, 3]
    required: false
    description: "HRU type (0=inactive, 1=land, 2=lake, 3=swale)"

  # --- Depression storage (Step 6, future) ---
  dprst_frac:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of HRU with surface depressions"

  dprst_area_max:
    dimension: nhru
    units: acres
    valid_range: [0.0, 100000000.0]
    required: false
    description: "Maximum surface depression area"

  # --- Routing (Step 12, future) ---
  K_coef:
    dimension: nsegment
    units: hours
    valid_range: [0.0, 240.0]
    required: false
    description: "Muskingum storage time coefficient"

  x_coef:
    dimension: nsegment
    units: dimensionless
    valid_range: [0.0, 0.5]
    required: false
    description: "Muskingum routing weighting factor"

  # --- Solar radiation (Step 9, future) ---
  soltab_potsw:
    dimension: [nhru, 366]
    units: langleys_per_day
    valid_range: [0.0, 1000.0]
    required: false
    description: "Potential shortwave radiation table"

  soltab_horad_potsw:
    dimension: [nhru, 366]
    units: langleys_per_day
    valid_range: [0.0, 1000.0]
    required: false
    description: "Horizontal potential shortwave radiation"

  # --- PET (Step 10, future) ---
  jh_coef:
    dimension: nmonths
    units: per_degF_per_day
    valid_range: [0.0, 100.0]
    required: false
    description: "Jensen-Haise PET coefficient (monthly)"

  jh_coef_hru:
    dimension: nhru
    units: per_degF_per_day
    valid_range: [0.0, 100.0]
    required: false
    description: "Per-HRU Jensen-Haise air temperature coefficient"

  # --- Climate-derived (Step 11, future) ---
  transp_beg:
    dimension: nhru
    units: integer_month
    valid_range: [1, 12]
    required: false
    description: "Month transpiration begins"

  transp_end:
    dimension: nhru
    units: integer_month
    valid_range: [1, 12]
    required: false
    description: "Month transpiration ends"

  # --- Snow defaults (Step 13) ---
  den_init:
    dimension: one
    units: decimal_fraction
    valid_range: [0.01, 0.80]
    required: false
    description: "Initial snow density"

  den_max:
    dimension: one
    units: decimal_fraction
    valid_range: [0.10, 0.90]
    required: false
    description: "Maximum snow density"

  settle_const:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Snow settlement constant"

  emis_noppt:
    dimension: one
    units: decimal_fraction
    valid_range: [0.5, 1.0]
    required: false
    description: "Emissivity of air on no-precip days"

  freeh2o_cap:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 0.20]
    required: false
    description: "Free-water holding capacity of snowpack"

  potet_sublim:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fraction of PET that can be sublimation"

  tmax_allsnow:
    dimension: one
    units: degF
    valid_range: [20.0, 45.0]
    required: false
    description: "Maximum temperature for all-snow precipitation"

  # --- Albedo defaults ---
  albset_rna:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: rain on new snow, accumulation period"

  albset_snm:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: snowmelt in melt period"

  albset_rnm:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: rain in melt period"

  albset_sna:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Albedo reset: new snow in accumulation period"

  # --- Radiation defaults ---
  radmax:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Maximum fraction of potential solar radiation"

  radj_sppt:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Summer precipitation radiation adjustment"

  radj_wppt:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Winter precipitation radiation adjustment"

  # --- Initial conditions ---
  soil_moist_init_frac:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Initial soil moisture as fraction of max"

  soil_rechr_init_frac:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Initial recharge zone moisture as fraction of max"

  ssstor_init_frac:
    dimension: one
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Initial subsurface storage as fraction"

  gwstor_init:
    dimension: one
    units: inches
    valid_range: [0.0, 100.0]
    required: false
    description: "Initial groundwater storage"

  gwstor_min:
    dimension: one
    units: inches
    valid_range: [0.0, 100.0]
    required: false
    description: "Minimum groundwater storage"

  dprst_depth_avg:
    dimension: one
    units: inches
    valid_range: [0.0, 1000.0]
    required: false
    description: "Average surface depression depth"

  transp_tmax:
    dimension: one
    units: degree_days
    valid_range: [0.0, 10000.0]
    required: false
    description: "Accumulated degree-days threshold for transpiration"

  # --- Calibration parameters (Step 14, future — seeds only) ---
  carea_max:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Maximum contributing area"

  smidx_coef:
    dimension: nhru
    units: dimensionless
    valid_range: [0.001, 0.06]
    required: false
    description: "Soil moisture index coefficient"

  smidx_exp:
    dimension: nhru
    units: dimensionless
    valid_range: [0.1, 0.8]
    required: false
    description: "Soil moisture index exponent"

  soil2gw_max:
    dimension: nhru
    units: inches
    valid_range: [0.0, 5.0]
    required: false
    description: "Max soil-to-groundwater flow rate"

  ssr2gw_rate:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Subsurface-to-groundwater linear coefficient"

  ssr2gw_exp:
    dimension: nhru
    units: dimensionless
    valid_range: [0.0, 3.0]
    required: false
    description: "Subsurface-to-groundwater exponent"

  slowcoef_lin:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.001, 0.5]
    required: false
    description: "Slow interflow linear coefficient"

  slowcoef_sq:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Slow interflow nonlinear coefficient"

  fastcoef_lin:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.001, 1.0]
    required: false
    description: "Fast interflow linear coefficient"

  fastcoef_sq:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Fast interflow nonlinear coefficient"

  pref_flow_den:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 0.1]
    required: false
    description: "Preferential flow pore density"

  gwflow_coef:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.001, 0.5]
    required: false
    description: "Groundwater discharge coefficient"

  gwsink_coef:
    dimension: nhru
    units: decimal_fraction
    valid_range: [0.0, 1.0]
    required: false
    description: "Groundwater sink coefficient (deep losses)"

  snarea_thresh:
    dimension: nhru
    units: inches
    valid_range: [0.1, 200.0]
    required: false
    description: "Snow depletion threshold"

  # --- Climate adjustments (monthly, Step 14 future) ---
  rain_cbh_adj:
    dimension: [nhru, 12]
    units: decimal_fraction
    valid_range: [0.5, 2.0]
    required: false
    description: "Monthly rain adjustment factor"

  snow_cbh_adj:
    dimension: [nhru, 12]
    units: decimal_fraction
    valid_range: [0.5, 2.0]
    required: false
    description: "Monthly snow adjustment factor"

  tmax_cbh_adj:
    dimension: [nhru, 12]
    units: degF
    valid_range: [-10.0, 10.0]
    required: false
    description: "Monthly tmax adjustment"

  tmin_cbh_adj:
    dimension: [nhru, 12]
    units: degF
    valid_range: [-10.0, 10.0]
    required: false
    description: "Monthly tmin adjustment"

  tmax_allrain_offset:
    dimension: [nhru, 12]
    units: degF
    valid_range: [0.0, 20.0]
    required: false
    description: "Offset from tmax_allsnow for all-rain threshold"

  adjmix_rain:
    dimension: [nhru, 12]
    units: decimal_fraction
    valid_range: [0.5, 1.5]
    required: false
    description: "Rain/snow mix adjustment factor"

  dday_slope:
    dimension: [nhru, 12]
    units: dimensionless
    valid_range: [0.2, 0.8]
    required: false
    description: "Degree-day radiation slope (monthly)"

  dday_intcp:
    dimension: [nhru, 12]
    units: dimensionless
    valid_range: [-60.0, 10.0]
    required: false
    description: "Degree-day radiation intercept (monthly)"
