# Reclassify NLCD land cover classes to PRMS cov_type.
# Source: Regan et al. 2018 (TM6-B9), Table A1-3.

name: nlcd_to_prms_cov_type
description: "NLCD Anderson Level II class to PRMS vegetation cover type"
source: "Regan et al. 2018 (USGS TM6-B9)"

# PRMS cov_type values:
#   0 = bare soil
#   1 = grasses
#   2 = shrubs
#   3 = deciduous trees
#   4 = coniferous trees

mapping:
  11: 0   # Open Water -> bare
  12: 0   # Perennial Ice/Snow -> bare
  21: 1   # Developed, Open Space -> grasses
  22: 1   # Developed, Low Intensity -> grasses
  23: 0   # Developed, Medium Intensity -> bare (impervious dominated)
  24: 0   # Developed, High Intensity -> bare
  31: 0   # Barren Land -> bare
  41: 3   # Deciduous Forest -> trees
  42: 4   # Evergreen Forest -> coniferous
  43: 3   # Mixed Forest -> trees (could split by dominant)
  51: 2   # Dwarf Shrub (AK only) -> shrubs
  52: 2   # Shrub/Scrub -> shrubs
  71: 1   # Grassland/Herbaceous -> grasses
  72: 1   # Sedge/Herbaceous (AK) -> grasses
  73: 1   # Lichens (AK) -> grasses
  74: 0   # Moss (AK) -> bare
  81: 1   # Pasture/Hay -> grasses
  82: 1   # Cultivated Crops -> grasses
  90: 2   # Woody Wetlands -> shrubs
  95: 1   # Emergent Herbaceous Wetlands -> grasses
