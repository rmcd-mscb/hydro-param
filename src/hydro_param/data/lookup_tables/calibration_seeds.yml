# Calibration parameter seed values for pywatershed/PRMS.
# Source: Regan et al. 2018 (TM6-B9), Hay et al. 2023, NHM methodology.
#
# Each seed has:
#   method: one of linear, exponential_scale, fraction_of, constant
#   params: method-specific parameters (input, scale, offset, etc.)
#   range: [min, max] — output is clipped to this range
#   default: fallback value when required inputs are missing

name: calibration_seeds
description: "Physically-based initial values for calibration parameters"
source: "Regan et al. 2018 (TM6-B9), Hay et al. 2023"

mapping:
  carea_max:
    method: linear
    params: {input: hru_percent_imperv, scale: 0.6, offset: 0.2}
    range: [0.0, 1.0]
    default: 0.4

  smidx_coef:
    method: exponential_scale
    params: {input: hru_slope, scale: 0.005, exponent: 3.0}
    range: [0.001, 0.06]
    default: 0.01

  smidx_exp:
    method: constant
    params: {value: 0.3}
    range: [0.1, 0.8]
    default: 0.3

  soil2gw_max:
    method: fraction_of
    params: {input: soil_moist_max, fraction: 0.1}
    range: [0.0, 5.0]
    default: 0.1

  ssr2gw_rate:
    method: constant
    params: {value: 0.1}
    range: [0.0, 1.0]
    default: 0.1

  ssr2gw_exp:
    method: constant
    params: {value: 1.0}
    range: [0.0, 3.0]
    default: 1.0

  slowcoef_lin:
    method: constant
    params: {value: 0.015}
    range: [0.001, 0.5]
    default: 0.015

  slowcoef_sq:
    method: constant
    params: {value: 0.1}
    range: [0.0, 1.0]
    default: 0.1

  fastcoef_lin:
    method: constant
    params: {value: 0.09}
    range: [0.001, 0.8]
    default: 0.09

  fastcoef_sq:
    method: constant
    params: {value: 0.8}
    range: [0.0, 1.0]
    default: 0.8

  pref_flow_den:
    method: constant
    params: {value: 0.0}
    range: [0.0, 0.1]
    default: 0.0

  gwflow_coef:
    method: constant
    params: {value: 0.015}
    range: [0.001, 0.5]
    default: 0.015

  gwsink_coef:
    method: constant
    params: {value: 0.0}
    range: [0.0, 1.0]
    default: 0.0

  snarea_thresh:
    method: fraction_of
    params: {input: soil_moist_max, fraction: 0.8}
    range: [0.0, 200.0]
    default: 50.0

  rain_cbh_adj:
    method: constant
    params: {value: 1.0}
    range: [0.5, 2.0]
    default: 1.0

  snow_cbh_adj:
    method: constant
    params: {value: 1.0}
    range: [0.5, 2.0]
    default: 1.0

  tmax_cbh_adj:
    method: constant
    params: {value: 0.0}
    range: [-10.0, 10.0]
    default: 0.0

  tmin_cbh_adj:
    method: constant
    params: {value: 0.0}
    range: [-10.0, 10.0]
    default: 0.0

  tmax_allrain_offset:
    method: constant
    params: {value: 1.0}
    range: [0.0, 10.0]
    default: 1.0

  adjmix_rain:
    method: constant
    params: {value: 1.0}
    range: [0.6, 1.4]
    default: 1.0

  dday_slope:
    method: constant
    params: {value: 0.4}
    range: [0.2, 0.9]
    default: 0.4

  dday_intcp:
    method: constant
    params: {value: -40.0}
    range: [-60.0, 10.0]
    default: -40.0
