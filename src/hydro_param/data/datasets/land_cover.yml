# Dataset registry: land cover datasets.
# See design.md sections 6.6, 6.10, and 11.3.

datasets:
  # --- NLCD Annual via NHGF STAC OSN (free, anonymous access) ---
  # One entry per STAC collection. Uses NHGFStacTiffData + ZonalGen directly.

  nlcd_osn_lndcov:
    description: "Annual NLCD Land Cover via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-LndCov
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: LndCov
        band: 1
        long_name: "Land cover class"
        native_name: "LndCov"
        categorical: true

  nlcd_osn_fctimp:
    description: "Annual NLCD Fractional Impervious via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-FctImp
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: FctImp
        band: 1
        units: "%"
        long_name: "Fractional impervious surface"
        native_name: "FctImp"
        categorical: false

  nlcd_osn_impdsc:
    description: "Annual NLCD Impervious Descriptor via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-ImpDsc
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: ImpDsc
        band: 1
        long_name: "Impervious descriptor"
        native_name: "ImpDsc"
        categorical: true

  nlcd_osn_lndchg:
    description: "Annual NLCD Land Cover Change via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-LndChg
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: LndChg
        band: 1
        long_name: "Land cover change"
        native_name: "LndChg"
        categorical: true

  nlcd_osn_lndcnf:
    description: "Annual NLCD Land Cover Confidence via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-LndCnf
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: LndCnf
        band: 1
        units: "%"
        long_name: "Land cover confidence"
        native_name: "LndCnf"
        categorical: false

  nlcd_osn_spcchg:
    description: "Annual NLCD Spectral Change via NHGF STAC OSN, 30m (1985-2024)"
    strategy: nhgf_stac
    collection: nlcd-SpcChg
    crs: "EPSG:5070"
    x_coord: "x"
    y_coord: "y"
    category: land_cover
    temporal: false
    year_range: [1985, 2024]
    variables:
      - name: SpcChg
        band: 1
        units: "day_of_year"
        long_name: "Spectral change day of year"
        native_name: "SpcChg"
        categorical: false
